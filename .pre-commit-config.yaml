default_language_version:
  python: python3.12
default_stages: [pre-push]
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: pipenv run ruff format --diff
        language: system
        pass_filenames: true
        types: ["python"]

      - id: mypy
        name: mypy
        entry: pipenv run mypy
        language: system
        pass_filenames: true
        types: ["python"]
        exclude: "(tests/|output/|migrations/)"

      - id: ruff-check
        name: ruff-check
        entry: pipenv run ruff check
        language: system
        pass_filenames: true
        types: ["python"]